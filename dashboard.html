<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Vales</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg-main: #09090b; --bg-secondary: #18181b; --card-bg: #121214; --card-hover: #1f1f22; --border: rgba(255, 255, 255, 0.08); --border-hover: rgba(255, 255, 255, 0.2); --text-main: #f4f4f5; --text-secondary: #a1a1aa; --accent: #10b981; --status-online: #10B981; --danger: #ef4444; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: radial-gradient(circle at top, var(--bg-secondary), var(--bg-main)); background-attachment: fixed; color: var(--text-main); min-height: 100vh; display: flex; flex-direction: column; -webkit-font-smoothing: antialiased;}

        nav { position: sticky; top: 0; width: 100%; height: 70px; background: rgba(9, 9, 11, 0.75); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; padding: 0 5%; z-index: 1000; }
        .logo-img { height: 30px; object-fit: contain; }
        .nav-center { display: flex; height: 100%; gap: 10px; position: absolute; left: 50%; transform: translateX(-50%);}
        .nav-item { display: flex; align-items: center; justify-content: center; width: 60px; height: 100%; color: var(--text-secondary); cursor: pointer; transition: 0.2s; position: relative;}
        .nav-item:hover, .nav-item.active { color: var(--text-main); }
        .nav-item svg { width: 22px; height: 22px; fill: none; stroke: currentColor; stroke-width: 2; }
        .nav-item.active::after { content: ''; position: absolute; bottom: -1px; left: 15%; width: 70%; height: 3px; background-color: var(--accent); border-radius: 3px 3px 0 0; }
        
        .nav-right { display: flex; align-items: center; gap: 15px; }
        .profile-btn { display: flex; align-items: center; gap: 10px; background: rgba(255,255,255,0.03); border: 1px solid var(--border); padding: 4px 16px 4px 4px; border-radius: 100px; transition: 0.2s; cursor: pointer; }
        .profile-btn:hover { background: rgba(255,255,255,0.08); }
        .profile-btn img { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; }
        .profile-btn span { font-size: 0.9rem; font-weight: 600; color: var(--text-main); }

        .dashboard-container { max-width: 900px; margin: 50px auto; padding: 0 5%; flex-grow: 1; width: 100%; }
        .header-section { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 30px; }
        .header-section h1 { font-size: 1.8rem; font-weight: 800; letter-spacing: -0.5px; }
        .header-section p { color: var(--text-secondary); font-size: 0.95rem; margin-top: 5px; }
        .btn-new { background: var(--accent); color: #fff; padding: 10px 20px; border-radius: 10px; font-size: 0.95rem; font-weight: 600; text-decoration: none; transition: 0.2s; display: flex; align-items: center; gap: 8px; border:none;}
        .btn-new:hover { background: #059669; transform: translateY(-2px);}

        .servers-list { display: flex; flex-direction: column; gap: 16px; }
        .server-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 16px; padding: 24px; display: flex; align-items: center; cursor: pointer; transition: all 0.3s; text-decoration: none; color: inherit; position: relative;}
        .server-card:hover { background: var(--card-hover); border-color: var(--border-hover); transform: translateY(-4px); box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .server-icon { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); width: 54px; height: 54px; border-radius: 14px; display: flex; justify-content: center; align-items: center; margin-right: 20px; flex-shrink: 0; }
        .server-icon svg { width: 26px; height: 26px; stroke: var(--text-secondary); fill: none; stroke-width: 1.5; }
        .server-card:hover .server-icon svg { stroke: var(--text-main); }
        
        .server-info { flex-grow: 1; }
        .server-header { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
        .server-info h3 { font-size: 1.15rem; font-weight: 700; }
        .status-dot { width: 8px; height: 8px; background-color: var(--text-secondary); border-radius: 50%; }
        .status-dot.online { background-color: var(--status-online); box-shadow: 0 0 10px 2px rgba(16, 185, 129, 0.4); }
        .server-info p { color: var(--text-secondary); font-size: 0.85rem; font-weight: 500; }
        
        .badge-shared { background: rgba(59, 130, 246, 0.1); color: #3b82f6; border: 1px solid rgba(59, 130, 246, 0.3); padding: 4px 10px; border-radius: 100px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase;}
        .btn-manage { background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: var(--text-main); padding: 8px 16px; border-radius: 8px; font-size: 0.85rem; font-weight: 600; transition: 0.2s;}
        .server-card:hover .btn-manage { background: #fff; color: #000; border-color: #fff;}

        .empty-state { text-align: center; padding: 60px 20px; border: 1px dashed var(--border); border-radius: 16px; }
    </style>
</head>
<body>

    <nav>
        <a href="index.html"><img src="https://i.ibb.co/hxGHF2xc/vales-remove.png" alt="Vales" class="logo-img"></a>
        <div class="nav-center">
            <a href="index.html" class="nav-item"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg></a>
            <div class="nav-item active"><svg viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="8" rx="2" ry="2"></rect><rect x="2" y="14" width="20" height="8" rx="2" ry="2"></rect></svg></div>
        </div>
        <div class="nav-right">
            <div class="profile-btn" onclick="logout()" title="Se déconnecter">
                <img id="user-avatar" src="" alt="Avatar">
                <span id="user-name">...</span>
            </div>
        </div>
    </nav>

    <main class="dashboard-container">
        <div class="header-section">
            <div><h1>Mes Instances</h1><p>Gérez vos serveurs et ceux auxquels vous avez accès.</p></div>
            <a href="create-bot.html" class="btn-new">Nouveau Bot</a>
        </div>
        <div class="servers-list" id="bots-list"><div style="text-align: center; padding: 50px; color: var(--text-secondary);">Connexion...</div></div>
    </main>

    <script>
        let currentUser = null;

        window.onload = async () => {
            const token = localStorage.getItem('discord_token');
            if (!token) return window.location.href = 'login.html'; 
            try {
                const response = await fetch('https://discord.com/api/users/@me', { headers: { authorization: `Bearer ${token}` } });
                currentUser = await response.json();
                if(!currentUser.username) throw new Error("Invalide");
                
                document.getElementById('user-name').innerText = currentUser.username;
                document.getElementById('user-avatar').src = currentUser.avatar ? `https://cdn.discordapp.com/avatars/${currentUser.id}/${currentUser.avatar}.png` : `https://cdn.discordapp.com/embed/avatars/0.png`;

                loadBotsFromDatabase();
            } catch (error) { logout(); }
        };

        function logout() {
            localStorage.removeItem('discord_token');
            window.location.href = 'index.html';
        }

        async function loadBotsFromDatabase() {
            const botsListContainer = document.getElementById('bots-list');
            try {
                const res = await fetch(`api.php?action=get&discord_id=${currentUser.id}`);
                const bots = await res.json();

                if(bots.length === 0) {
                    botsListContainer.innerHTML = `<div class="empty-state"><h3>Aucune instance</h3><p>Vous n'avez pas encore déployé de bot.</p></div>`;
                    return;
                }

                botsListContainer.innerHTML = '';
                bots.forEach(bot => {
                    let iconSvg = `<svg viewBox="0 0 24 24"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>`;
                    if(bot.engine === "Node.js") iconSvg = `<svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path></svg>`;
                    if(bot.engine === "Python") iconSvg = `<svg viewBox="0 0 24 24"><polyline points="4 17 10 11 4 5"></polyline><line x1="12" y1="19" x2="20" y2="19"></line></svg>`;

                    let isShared = (bot.owner_id !== currentUser.id);
                    let badgeHtml = isShared ? `<span class="badge-shared">Accès partagé</span>` : '';
                    let dotClass = bot.status === 'En ligne' ? 'status-dot online' : 'status-dot';

                    botsListContainer.innerHTML += `
                        <a href="filesmanagers.html?id=${bot.id}" class="server-card">
                            <div class="server-icon">${iconSvg}</div>
                            <div class="server-info">
                                <div class="server-header">
                                    <h3>${bot.name}</h3>
                                    <div class="${dotClass}" title="${bot.status}"></div>
                                    ${badgeHtml}
                                </div>
                                <p>${bot.engine} • ${bot.template}</p>
                            </div>
                            <div class="btn-manage">Accéder au Panel</div>
                        </a>
                    `;
                });
            } catch (err) {
                botsListContainer.innerHTML = `<div class="empty-state"><p style="color:#ef4444;">Erreur API (api.php)</p></div>`;
            }
        }
    </script>
</body>
</html>
