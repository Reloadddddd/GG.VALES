<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - Vales</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg-body: #0a0a0c; --bg-card: #111114; --border: #1f1f23; --text-main: #f9fafb; --text-secondary: #a1a1aa; --accent: #10b981; --accent-soft: rgba(16, 185, 129, 0.15); --discord: #5865F2; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-body); color: var(--text-main); height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        .grid-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: radial-gradient(#1f1f23 1px, transparent 1px); background-size: 30px 30px; z-index: -1; opacity: 0.4; }
        .login-card { width: 90%; max-width: 420px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 24px; padding: 45px 40px; text-align: center; box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4); position: relative; z-index: 1; }
        .logo-img { height: 45px; margin: 0 auto 30px auto; display: block; object-fit: contain; }
        .icon-wrapper { width: 64px; height: 64px; background: var(--accent-soft); border: 1px solid rgba(16, 185, 129, 0.3); border-radius: 50%; display: flex; justify-content: center; align-items: center; margin: 0 auto 20px auto; }
        .icon-wrapper svg { width: 32px; height: 32px; stroke: var(--accent); fill: none; stroke-width: 2;}
        .badge-secure { background: rgba(255, 255, 255, 0.05); color: var(--text-secondary); font-size: 0.75rem; font-weight: 600; padding: 4px 12px; border-radius: 100px; display: inline-flex; align-items: center; gap: 6px; margin-bottom: 15px; border: 1px solid var(--border); }
        .badge-secure svg { width: 12px; height: 12px; fill: var(--accent); }
        h2 { font-size: 1.5rem; font-weight: 800; margin-bottom: 10px; }
        p { color: var(--text-secondary); font-size: 0.95rem; margin-bottom: 35px; line-height: 1.5; }
        .btn-discord { display: flex; align-items: center; justify-content: center; gap: 12px; width: 100%; background: var(--discord); color: white; text-decoration: none; padding: 16px; border-radius: 14px; font-weight: 600; font-size: 1.05rem; transition: 0.3s; border: none; cursor: pointer; }
        .btn-discord:hover { background: #4752c4; transform: translateY(-2px); }
        .btn-discord svg { width: 24px; height: 24px; fill: currentColor; }
        .back-link { display: inline-flex; align-items: center; gap: 6px; margin-top: 30px; color: var(--text-secondary); text-decoration: none; font-size: 0.9rem; font-weight: 500; }
        .back-link:hover { color: var(--text-main); }
        #loading-text { display: none; color: var(--accent); font-weight: 600; margin-top: 15px;}
    </style>
</head>
<body>
    <div class="grid-bg"></div>
    <div class="login-card">
        <img src="https://i.ibb.co/hxGHF2xc/vales-remove.png" alt="Vales" class="logo-img">
        <div class="icon-wrapper">
            <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
        </div>
        <div class="badge-secure"><svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg> Espace Sécurisé</div>
        <h2>Authentification</h2>
        <p>Connectez-vous pour configurer votre robot et gérer vos paramètres.</p>
        
        <div id="login-btn-container">
            <button onclick="loginWithDiscord()" class="btn-discord">
                <svg viewBox="0 0 24 24"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/></svg>
                Continuer avec Discord
            </button>
        </div>
        <div id="loading-text">Connexion automatique...</div>

        <a href="index.html" class="back-link">← Retourner à l'accueil</a>
    </div>

    <script>
        // SI DEJA CONNECTÉ, REDIRECTION VERS LE DASHBOARD
        window.onload = async () => {
            const token = localStorage.getItem('discord_token');
            if (token) {
                document.getElementById('login-btn-container').style.display = 'none';
                document.getElementById('loading-text').style.display = 'block';
                try {
                    const res = await fetch('https://discord.com/api/users/@me', { headers: { authorization: `Bearer ${token}` } });
                    if (!res.ok) throw new Error("Invalide");
                    window.location.href = 'dashboard.html'; // Redirection !
                } catch(err) {
                    localStorage.removeItem('discord_token');
                    document.getElementById('login-btn-container').style.display = 'block';
                    document.getElementById('loading-text').style.display = 'none';
                }
            }
        };

        function loginWithDiscord() {
            const CLIENT_ID = '1460391688861388891'; 
            const REDIRECT_URI = encodeURIComponent('https://byyony-web.unaux.com'); 
            window.location.href = `https://discord.com/api/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${REDIRECT_URI}&response_type=token&scope=identify`;
        }
    </script>
</body>
</html>
